<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Email Signature</title>
  <style>
    :root {
      --bg-1: #edf4ff;
      --bg-2: #dfefff;
      --card-1: #ffffff;
      --card-2: #f3f9ff;
      --text-strong: #10243d;
      --text-soft: #4d647f;
      --line: #d5e6fb;
      --brand-1: #0ea5e9;
      --brand-2: #0f766e;
      --brand-3: #2563eb;
    }

    body {
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at 10% 0%, #f8fcff 0%, var(--bg-1) 42%, var(--bg-2) 100%);
      font-family: 'Poppins', Geneva, Verdana, sans-serif;
      color: var(--text-strong);
    }

    .signature-shell {
      max-width: 720px;
      margin: 0 auto;
    }

    .signature-card {
      position: relative;
      display: flex;
      align-items: stretch;
      gap: 0;
      background: linear-gradient(140deg, var(--card-1) 0%, var(--card-2) 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(15, 42, 72, 0.16);
    }

    .signature-card::after {
      content: "";
      position: absolute;
      right: -120px;
      top: -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.2) 0%, rgba(14, 165, 233, 0) 72%);
      pointer-events: none;
    }

    .signature-accent {
      width: 10px;
      background: linear-gradient(180deg, var(--brand-1) 0%, var(--brand-3) 40%, var(--brand-2) 100%);
      flex-shrink: 0;
    }

    .signature-main {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 24px;
      padding: 26px 30px;
    }

    .profile-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 140px;
    }

    .avatar-frame {
      position: relative;
      width: 108px;
      height: 108px;
      border-radius: 28px;
      padding: 4px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-3), var(--brand-2));
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.25);
    }

    .avatar {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 24px;
      object-fit: cover;
      background: #e8f2ff;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.12);
      color: #115e86;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-1);
      box-shadow: 0 0 0 6px rgba(14, 165, 233, 0.18);
    }

    .content-block {
      flex: 1;
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #0c7ea8;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .name {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.03em;
    }

    .role {
      margin: 8px 0 16px;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-soft);
      font-weight: 600;
    }

    .role strong {
      color: #0f6096;
    }

    .divider {
      width: 100%;
      height: 1px;
      margin: 0 0 18px;
      background: linear-gradient(90deg, rgba(14, 165, 233, 0.48), rgba(14, 165, 233, 0));
    }

    /* --- CONTACT GRID UPDATES --- */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 20px;
      margin-bottom: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #37546f;
    }

    .icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #cde3fb;
      color: #0b84b1;
      flex-shrink: 0;
      box-shadow: 0 6px 14px rgba(12, 126, 168, 0.14);
    }

    /* SVG specifically */
    .icon svg {
      width: 16px;
      height: 16px;
    }

    .contact-item a {
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s ease;
    }

    .contact-item a:hover {
      color: #155e94;
    }

    .cta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .cta-note {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: #45617b;
      flex: 1;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 55%, #0f766e 100%);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.3);
    }

    .portfolio-note {
      margin: 18px 8px 0;
      font-size: 11px;
      line-height: 1.6;
      color: #6e87a1;
      text-align: center;
    }

    @media (max-width: 640px) {
      .signature-main {
        flex-direction: column;
        align-items: flex-start;
        padding: 22px;
      }

      .profile-block {
        width: 100%;
        flex-direction: row;
        justify-content: flex-start;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }

      .name {
        font-size: 24px;
      }
    }
  </style>
</head>
